<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title | default: site.title }}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f9f9f9;
      --surface: #ffffff;
      --border: #e5e7eb;
      --text: #111827;
      --text-muted: #6b7280;
      --accent: #2563eb;
      --radius: 10px;
      --max-w: 760px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
    }

    header .inner {
      max-width: var(--max-w);
      margin: 0 auto;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header a.brand {
      font-weight: 600;
      font-size: 15px;
      text-decoration: none;
      color: var(--text);
    }

    header a.home-link {
      font-size: 13px;
      color: var(--accent);
      text-decoration: none;
    }

    header a.home-link:hover { text-decoration: underline; }

    main {
      flex: 1;
      max-width: var(--max-w);
      width: 100%;
      margin: 40px auto;
      padding: 0 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px 48px;
    }

    /* Typography inside card */
    .card h1 { font-size: 26px; font-weight: 700; margin-bottom: 4px; }
    .card .meta { font-size: 13px; color: var(--text-muted); margin-bottom: 32px; }
    .card h2 { font-size: 17px; font-weight: 600; margin: 32px 0 10px; }
    .card h3 { font-size: 15px; font-weight: 600; margin: 20px 0 8px; }
    .card p  { margin-bottom: 12px; font-size: 15px; }
    .card ul, .card ol { padding-left: 22px; margin-bottom: 12px; }
    .card li { font-size: 15px; margin-bottom: 4px; }
    .card a  { color: var(--accent); }
    .card strong { font-weight: 600; }
    .card hr { border: none; border-top: 1px solid var(--border); margin: 28px 0; }

    /* Home page list */
    .app-list { list-style: none; padding: 0; }
    .app-list li { margin-bottom: 8px; }
    .app-list a { color: var(--accent); font-size: 15px; text-decoration: none; }
    .app-list a:hover { text-decoration: underline; }

    footer {
      text-align: center;
      padding: 24px;
      font-size: 12px;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
    }

    @media (max-width: 600px) {
      .card { padding: 28px 20px; }
      main { margin: 20px auto; }
    }
  </style>
</head>
<body>
  <header>
    <div class="inner">
      <a class="brand" href="{{ '/' | relative_url }}">Legal Documents</a>
      {% if page.url != '/' %}<a class="home-link" href="{{ '/' | relative_url }}">← All documents</a>{% endif %}
    </div>
  </header>

  <main>
    <div class="card">
      {{ content }}
    </div>
  </main>

  <footer>
    &copy; {{ site.time | date: '%Y' }} Tanner Gordon. All rights reserved.
  </footer>
</body>
</html>
